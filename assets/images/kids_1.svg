<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="100%" stop-color="#fbcfe8" />
    </linearGradient>
    <linearGradient id="kidsGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#ec4899" flood-opacity="0.25" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" rx="20" />
  
  <!-- Decorative bubbles -->
  <circle cx="100" cy="120" r="40" fill="#ffffff" opacity="0.3" />
  <circle cx="420" cy="160" r="30" fill="#ffffff" opacity="0.3" />
  <circle cx="360" cy="80" r="20" fill="#ffffff" opacity="0.3" />
  <circle cx="120" cy="380" r="25" fill="#ffffff" opacity="0.3" />

  <!-- Cute Kid's Shoe Graphics -->
  <g transform="translate(50, 80)" filter="url(#softShadow)">
    <!-- Sole (Thick and Soft) -->
    <path d="M60,260 C130,270 200,275 260,250 C310,230 350,190 380,180 C380,210 340,260 280,280 C220,300 120,300 60,260 Z" fill="#ffffff" stroke="url(#kidsGrad)" stroke-width="4" />
    <!-- Shoe Upper Body (Stubby, rounded) -->
    <path d="M80,245 C120,245 150,200 180,150 C210,100 280,90 320,120 C340,135 360,160 370,180 C340,190 300,230 260,250 C200,275 130,270 80,245 Z" fill="url(#kidsGrad)" />
    
    <!-- Big Velcro Strap 1 -->
    <rect x="180" y="110" width="75" height="25" rx="8" fill="#fef08a" stroke="#ec4899" stroke-width="3" transform="rotate(15 180 110)" />
    <!-- Big Velcro Strap 2 -->
    <rect x="210" y="145" width="75" height="25" rx="8" fill="#fef08a" stroke="#3b82f6" stroke-width="3" transform="rotate(15 210 145)" />
    
    <!-- Cute Stitching Lines -->
    <path d="M110,230 C150,225 180,195 210,165" fill="none" stroke="#ffffff" stroke-width="3" stroke-dasharray="6 4" opacity="0.8" />
  </g>

  <!-- Typography overlay -->
  <text x="40" y="440" fill="#1e293b" font-family="'Outfit', sans-serif" font-weight="900" font-size="28" letter-spacing="2">ACTIVE VELCRO</text>
  <text x="40" y="465" fill="#ec4899" font-family="'Outfit', sans-serif" font-weight="700" font-size="14" letter-spacing="1">KIDS PLAYTIME SERIES</text>
</svg>
