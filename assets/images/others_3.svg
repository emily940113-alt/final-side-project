<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14532d" />
      <stop offset="100%" stop-color="#052e16" />
    </linearGradient>
    <linearGradient id="bootGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#78350f" />
      <stop offset="100%" stop-color="#451a03" />
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" rx="20" />
  
  <!-- Mountain graphic silhouette -->
  <polygon points="0,500 150,300 250,400 380,250 500,500" fill="#166534" opacity="0.4" />
  <polygon points="50,500 220,320 300,420 420,290 500,500" fill="#15803d" opacity="0.3" />

  <!-- Hiking Boot Graphic -->
  <g transform="translate(40, 60)" filter="url(#glow)">
    <!-- Rugged Vibram Sole (Very deep spikes) -->
    <path d="M50,290 L60,320 L80,315 L100,322 L120,318 L140,325 L160,320 L180,328 L200,322 L220,325 L240,318 L260,322 L280,315 L300,320 L320,310 L340,312 L360,290 C360,290 320,280 260,280 C200,280 120,290 50,290 Z" fill="#1e293b" />
    
    <!-- Heavy Boot Upper (Stout and High ankle) -->
    <path d="M70,270 C80,270 90,200 100,100 C150,90 190,110 210,130 C220,140 240,165 280,210 C320,240 345,260 350,270 C310,275 250,285 220,285 C160,285 110,275 70,270 Z" fill="url(#bootGrad)" stroke="#1e293b" stroke-width="3" />
    
    <!-- Ankle Support Padding -->
    <path d="M100,100 C120,95 160,95 180,105 L170,140 C150,135 120,135 110,140 Z" fill="#78716c" />
    
    <!-- Orange D-ring Lace loops -->
    <circle cx="170" cy="150" r="5" fill="#f97316" />
    <circle cx="185" cy="180" r="5" fill="#f97316" />
    <circle cx="200" cy="210" r="5" fill="#f97316" />
    <circle cx="215" cy="240" r="5" fill="#f97316" />
    
    <!-- Thick rope laces -->
    <path d="M170,150 L200,180 M185,180 L215,210 M200,210 L230,240" stroke="#f97316" stroke-width="4" stroke-linecap="round" />
    <!-- Reinforced rubber mudguard -->
    <path d="M220,285 C270,285 320,280 350,270 C345,260 320,240 280,250 C240,260 220,285 220,285 Z" fill="#1e293b" opacity="0.8" />
  </g>

  <!-- Typography overlay -->
  <text x="40" y="440" fill="#ffffff" font-family="'Outfit', sans-serif" font-weight="900" font-size="28" letter-spacing="3">CONQUEROR HIKING</text>
  <text x="40" y="465" fill="#f97316" font-family="'Outfit', sans-serif" font-weight="700" font-size="14" letter-spacing="1">TEXDRY WATERPROOF OUTDOOR BOOTS</text>
</svg>
