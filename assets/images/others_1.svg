<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fafaf9" />
      <stop offset="100%" stop-color="#d6d3d1" />
    </linearGradient>
    <linearGradient id="slipperGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e7e5e4" />
      <stop offset="100%" stop-color="#a8a29e" />
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#78716c" flood-opacity="0.15" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" rx="20" />
  
  <!-- Fluffy Cloud graphics -->
  <path d="M50,150 Q70,120 100,130 T150,140 T200,120 T250,150 Z" fill="#ffffff" opacity="0.6" />
  <path d="M300,100 Q320,80 340,90 T380,100 T420,80 T450,110 Z" fill="#ffffff" opacity="0.6" />

  <!-- Slipper Shoe Graphic -->
  <g transform="translate(60, 100)" filter="url(#softShadow)">
    <!-- Sole (Flat, cozy profile) -->
    <path d="M50,220 C100,230 180,230 240,210 C290,195 330,175 350,160 C350,180 310,210 260,230 C200,250 100,250 50,220 Z" fill="#ffffff" stroke="#a8a29e" stroke-width="2" />
    <!-- Slipper Cover (Soft wool curve) -->
    <path d="M120,205 C150,205 180,180 220,120 C250,80 310,90 340,135 C350,150 350,155 350,160 C310,175 290,195 240,210 C180,230 140,215 120,205 Z" fill="url(#slipperGrad)" />
    <!-- Fluffy Border Trim -->
    <path d="M220,120 C230,100 280,100 300,110 C320,120 330,130 340,135" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" />
  </g>

  <!-- Typography overlay -->
  <text x="40" y="440" fill="#44403c" font-family="'Outfit', sans-serif" font-weight="900" font-size="28" letter-spacing="2">CLOUD COMFORT</text>
  <text x="40" y="465" fill="#78716c" font-family="'Outfit', sans-serif" font-weight="700" font-size="14" letter-spacing="1">ULTIMATE WARM HOME SLIPPERS</text>
</svg>
